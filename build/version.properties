# Currently used IDEA Community branch
mps.idea.platform.number=252.25557

# IMPORTANT  Do not forget to update build number in <home>/build.txt; IDEA uses it for tests executed
#            with Run Configurations to check plugin compatibility


# Version of platform to download (the artifact of MPS Platform build)
# Can be set by several parameters of TeamCity Platform build:
# build number - exact build number
# latest.lastFinished
# latest.lastSuccessful
# latest.lastPinned
# TAG_NAME.tcbuildtag - where TAG_NAME is some TC tag on build
mps.platform.build=${mps.idea.platform.number}.644

# IDEA IC build to download and use on TC (e.g. in Tests from IDEA project, IDEA plug-in, etc.)
idea.platform.version=${mps.idea.platform.number}.131

# version of local platform build
idea.platform.snapshot=${mps.idea.platform.number}.SNAPSHOT

idea.commit=${mps.idea.platform.number}

# Use stable JetPad version
jetpad.version=1.0.0

# Kotlin libraries versions
kotlin.version=2.1.0
kotlinx.metadata.version=0.0.6

# JUnit5 libraries versions
junit.platform.version=1.13.4
junit.jupiter.version=5.13.4
junit.vintage.version=5.13.4
apiguardian.version=1.1.2
opentest4j.version=1.3.0